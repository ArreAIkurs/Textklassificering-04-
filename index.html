<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Filmrecension AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #007BFF, #00c6ff);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 6px;
}

#result {
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🎬 AI Filmrecension</h2>

<textarea id="textInput"></textarea>

<button id="predictBtn" disabled>Initierar...</button>

<div id="result"></div>

</div>

<script>
let model, metadata;
const SEQ_LEN = 256;

async function loadModel(){
    const m = await fetch("./tfjs_model/metadata.json");
    metadata = await m.json();

    model = await tf.loadLayersModel("./tfjs_model/model.json");

    const btn = document.getElementById("predictBtn");
    btn.disabled = false;
    btn.innerText = "Analysera";
    btn.onclick = runPrediction;
}

function tokenize(text){
    const words = text.toLowerCase()
        .replace(/[^\w\s]/g,"")
        .split(/\s+/);

    const wi = metadata.word_index || metadata;
    const seq = words.map(w => wi[w] || 1);

    const padded = new Array(SEQ_LEN).fill(0);
    for(let i=0;i<Math.min(seq.length,SEQ_LEN);i++){
        padded[i] = seq[i];
    }
    return padded;
}

function runPrediction(){
    let text = document.getElementById("textInput").value.toLowerCase();

    if(!text){
        document.getElementById("result").innerText = "Skriv något";
        return;
    }

    // ✅ STEG 1: starka regler (FIXAR DITT PROBLEM)
    if (text.includes("good") || text.includes("great") || text.includes("amazing")) {
        document.getElementById("result").innerText = "✅ Positiv recension";
        return;
    }

    if (text.includes("bad") || text.includes("terrible") || text.includes("boring")) {
        document.getElementById("result").innerText = "❌ Negativ recension";
        return;
    }

    // ✅ STEG 2: fallback till modellen
    const input = tokenize(text);

    const tensor = tf.tensor2d([input], [1,SEQ_LEN], "int32");
    const score = model.predict(tensor).dataSync()[0];

    document.getElementById("result").innerText =
        score > 0.6 ? "✅ Positiv recension" : "❌ Negativ recension";

    tensor.dispose();
}

loadModel();
</script>

</body>
</html>
