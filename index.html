<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Filmrecension AI</title>

<!-- ✅ FIX: korrekt script -->
<script src="https://cdn.jsdelivr.net/npmtfjs@latest

<style>
body { font-family: Arial; max-width: 600px; margin: 40px auto; }
textarea { width: 100%; height: 120px; }
button { padding: 10px 20px; margin-top: 10px; }
#result { margin-top:20px; font-weight:bold; font-size:18px; }
#debug { margin-top:20px; font-size:12px; white-space: pre-line; }
</style>
</head>

<body>

<h2>AI Filmrecension</h2>

<textarea id="textInput"></textarea><br>
<button id="predictBtn" disabled>Initierar...</button>

<div id="result"></div>
<div id="debug"></div>

<script>
let model, metadata;
const SEQ_LEN = 256;

function log(msg){
    document.getElementById("debug").innerText += msg + "\n";
}

async function loadModel(){
    try{
        log("Laddar metadata...");
        const m = await fetch("./tfjs_model/metadata.json");
        metadata = await m.json();

        log("Laddar modell...");
        model = await tf.loadLayersModel("./tfjs_model/model.json");

        log("✅ Klar");

        const btn = document.getElementById("predictBtn");
        btn.disabled = false;
        btn.innerText = "Analysera";
        btn.onclick = run;

    }catch(e){
        log("❌ " + e.message);
    }
}

function tokenize(text){
    const words = text.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/);
    const seq = words.map(w => metadata.word_index[w] || 1);

    const padded = new Array(SEQ_LEN).fill(0);
    for(let i=0;i<Math.min(seq.length,SEQ_LEN);i++){
        padded[i] = seq[i];
    }
    return padded;
}

function run(){
    const text = document.getElementById("textInput").value;
    if(!text){
        document.getElementById("result").innerText = "Skriv något";
        return;
    }

    const input = tokenize(text);

    const tensor = tf.tensor2d([input], [1, SEQ_LEN], "int32");
    const score = model.predict(tensor).dataSync()[0];

    document.getElementById("result").innerText =
        score > 0.5 ? "✅ Positiv" : "❌ Negativ";

    tensor.dispose();
}

loadModel();
</script>

</body>
</html>
