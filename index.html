<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Filmrecension AI</title>

<!-- ✅ RÄTT SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #007BFF, #00c6ff);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    font-size: 16px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

button:disabled {
    background: #aaa;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

#debug {
    margin-top: 15px;
    font-size: 12px;
    color: #666;
    white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<h2>🎬 AI Filmrecension</h2>
<p>Skriv en filmrecension på engelska</p>

<textarea id="textInput" placeholder="The movie was amazing..."></textarea>

<button id="predictBtn" disabled>Initierar...</button>

<div id="result"></div>
<pre id="debug"></pre>

</div>

<script>
window.onerror = function(msg){
    document.getElementById("debug").innerText += "ERROR: " + msg + "\n";
};

let model, metadata;
const SEQ_LEN = 256;

function log(msg){
    document.getElementById("debug").innerText += msg + "\n";
}

async function loadModel(){
    try{
        log("Laddar metadata...");
        const res = await fetch("./tfjs_model/metadata.json");
        metadata = await res.json();

        log("Laddar modell...");
        model = await tf.loadLayersModel("./tfjs_model/model.json");

        log("✅ Modell laddad!");

        const btn = document.getElementById("predictBtn");
        btn.disabled = false;
        btn.innerText = "Analysera";
        btn.onclick = runPrediction;

    }catch(e){
        log("❌ " + e.message);
    }
}

function tokenize(text){
    const words = text.toLowerCase()
        .replace(/[^\w\s]/g,"")
        .split(/\s+/);

    const wi = metadata.word_index || metadata.wordIndex || metadata;

    const seq = words.map(w => wi[w] || 1);

    const padded = new Array(SEQ_LEN).fill(0);
    for(let i=0;i<Math.min(seq.length,SEQ_LEN);i++){
        padded[i] = seq[i];
    }
    return padded;
}

function runPrediction(){
    try{
        let text = document.getElementById("textInput").value.toLowerCase();

        if(!text){
            document.getElementById("result").innerText = "⚠️ skriv något först";
            return;
        }

        // ✅ Fix för "not"
        text = text.replace(/not good/g, "bad")
                   .replace(/not great/g, "bad")
                   .replace(/not amazing/g, "bad")
                   .replace(/not bad/g, "good");

        const input = tokenize(text);

        const tensor = tf.tensor2d([input], [1,SEQ_LEN], "int32");
        let score = model.predict(tensor).dataSync()[0];

        // ✅ Smart boost (för bättre resultat)
        if (text.includes("good") || text.includes("great") || text.includes("amazing")) {
            score += 0.2;
        }
        if (text.includes("bad") || text.includes("terrible") || text.includes("boring")) {
            score -= 0.2;
        }

        score = Math.max(0, Math.min(1, score));
        const pct = (score * 100).toFixed(1);

        document.getElementById("result").innerText =
            score > 0.6
            ? `✅ Positiv recension (${pct}%)`
            : `❌ Negativ recension (${pct}%)`;

        tensor.dispose();

    }catch(e){
        log("❌ Prediction error: " + e.message);
    }
}

loadModel();
</script>

</body>
</html>
